<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawnz Apps &amp; Services</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #03080F;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Georgia, serif;
  }
  .logo-wrap {
    position: relative;
    width: 680px;
    height: 480px;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(201,162,39,0.38);
  }
  #matrix {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.18;
    pointer-events: none;
    z-index: 1;
  }
  svg {
    position: relative;
    z-index: 2;
    display: block;
  }
  /* Pulse animation on icon glow */
  @keyframes pulse {
    0%, 100% { opacity: 0.04; }
    50%       { opacity: 0.10; }
  }
  @keyframes traceDash {
    to { stroke-dashoffset: -24; }
  }
  @keyframes nodeBlink {
    0%, 100% { opacity: 0.9; }
    50%       { opacity: 0.4; }
  }
  .icon-halo   { animation: pulse 3s ease-in-out infinite; }
  .trace-dash  { animation: traceDash 1.8s linear infinite; }
  .node-blink  { animation: nodeBlink 2.2s ease-in-out infinite; }
  .node-blink2 { animation: nodeBlink 2.8s ease-in-out infinite 0.6s; }
  .node-blink3 { animation: nodeBlink 2s ease-in-out infinite 1.1s; }
</style>
</head>

<script>
const canvas = document.getElementById('matrix');
canvas.width  = 680;
canvas.height = 480;
const ctx  = canvas.getContext('2d');
const cols = Math.floor(680 / 16);
const drops = Array(cols).fill(0).map(() => Math.random() * -80);
const chars  = '01アイウエオカキクケコABCDEF0123456789';
function draw() {
  ctx.fillStyle = 'rgba(3,8,15,0.05)';
  ctx.fillRect(0, 0, 680, 480);
  for (let i = 0; i < cols; i++) {
    const r = Math.random();
    ctx.fillStyle = r > 0.66 ? '#C9A227' : r > 0.33 ? '#1A6FA8' : '#FFFFFF';
    ctx.font = '13px monospace';
    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 16, drops[i] * 16);
    if (drops[i] * 16 > 480 && Math.random() > 0.975) drops[i] = 0;
    drops[i] += 0.5;
  }
}
setInterval(draw, 60);
</script>
